name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published (or on manual dispatch).
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or stored secrets.
# One-time PyPI setup required: add a "pending publisher" at
# https://pypi.org/manage/account/publishing/ with
#   owner: setuidloot   repo: nessus-export
#   workflow: publish.yml   environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and check distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nessus-export
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
